<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UniSchedule — University Timetable Management</title>
<meta name="description" content="UniSchedule — Premium university timetable management system.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--navy:#1e2a5e;--navy-deep:#141d42;--gold:#f5c518;--gold-dark:#c9a200;
--gold-light:#fff3b0;--surface:#f7f8fc;--surface2:#eef0f8;
--text:#1a1a2e;--muted:#6b7280;--accent:#4f8ef7;--success:#10b981;
--danger:#ef4444;--warning:#f59e0b;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,197,24,.4)}50%{box-shadow:0 0 0 10px rgba(245,197,24,0)}}
@keyframes cardPop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes toastSlide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes floatBadge{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes dotPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--surface);color:var(--text);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--gold);color:var(--navy-deep)}
a{color:var(--gold-dark);text-decoration:none;cursor:pointer}
input,select,textarea,button{font-family:inherit}

/* ═══ LOGIN ═══ */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy-deep));position:relative;overflow:hidden}
#loginView::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(245,197,24,.12),transparent 65%);pointer-events:none}
#loginView::after{content:'';position:absolute;bottom:-80px;left:-80px;width:350px;height:350px;background:radial-gradient(circle,rgba(79,142,247,.08),transparent 65%);pointer-events:none}
.lcard{background:#fff;border-radius:24px;padding:44px 40px 36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .6s ease;position:relative;z-index:1}
.lcard h2{text-align:center;font-size:1.55rem;font-weight:700;color:var(--text);margin-bottom:2px}
.lcard .lsub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:24px}
.lcard .licon{text-align:center;font-size:2.2rem;margin-bottom:10px}
.role-tabs{display:flex;gap:0;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:24px}
.role-tab{flex:1;padding:10px 0;text-align:center;font-size:.82rem;font-weight:600;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--muted);border:none;background:transparent}
.role-tab.active{background:#fff;color:var(--navy-deep);box-shadow:0 2px 8px rgba(0,0,0,.08);border-bottom:3px solid var(--gold)}
.role-tab:hover:not(.active){color:var(--text)}
.linner{background:var(--surface);border-radius:14px;padding:24px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg:last-of-type{margin-bottom:0}
.fg label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.fg input,.fg select,.fg textarea{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:12px 16px;color:var(--text);font-size:.88rem;transition:all .2s;outline:none;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,24,.15);background:#fff}
.lbtn{width:100%;padding:13px;background:var(--gold);color:var(--navy-deep);font-weight:700;font-size:1rem;border:none;border-radius:12px;cursor:pointer;transition:all .25s;animation:pulse 2s ease-in-out infinite;margin-top:20px}
.lbtn:hover{background:var(--gold-dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,197,24,.4)}
.lforgot{text-align:center;margin-top:16px;font-size:.85rem;color:var(--gold-dark)}

/* ═══ LAYOUT ═══ */
#appView{display:none;min-height:100vh}
.wrap{display:flex;min-height:100vh}
.sb{width:220px;background:var(--navy-deep);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb::-webkit-scrollbar{width:0}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo h1{font-size:1.05rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.sb-logo h1 span{animation:floatBadge 3s ease-in-out infinite;display:inline-block}
.sb-logo .sub{font-size:.68rem;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:.04em}
.nsec{padding:12px 6px 4px}
.nsec-t{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);padding:0 14px;margin-bottom:4px}
.nl{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 6px;border-radius:10px;color:rgba(255,255,255,.55);font-size:.84rem;font-weight:500;transition:all .18s;cursor:pointer;border:none;background:none;width:calc(100% - 12px);text-align:left;position:relative}
.nl:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nl.act{background:var(--gold-light);color:var(--navy-deep);font-weight:600}
.nl.act::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nl .ni{font-size:1rem;width:20px;text-align:center;flex-shrink:0}
.sb-foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.06)}
.sb-foot button{background:none;border:none;color:rgba(255,255,255,.4);font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 0;transition:color .2s;font-family:inherit}
.sb-foot button:hover{color:var(--gold)}
.main{margin-left:220px;flex:1;min-height:100vh;background:var(--surface);padding:28px 32px}
.page{animation:fadeUp .45s ease forwards}

/* ═══ COMPONENTS ═══ */
.card{background:#fff;border-radius:16px;padding:26px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04)}
.card-t{font-size:1.02rem;font-weight:700;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:8px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.hdr h2{font-size:1.6rem;font-weight:700}.hdr p{color:var(--muted);font-size:.88rem;margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 20px;border:none;border-radius:10px;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-g{background:var(--gold);color:var(--navy-deep)}.btn-g:hover{background:var(--gold-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,197,24,.3)}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{filter:brightness(1.08)}
.btn-d{background:#fee2e2;color:#dc2626}.btn-d:hover{background:#fecaca}
.btn-o{background:var(--surface);border:1px solid #d1d5db;color:var(--navy)}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 13px;font-size:.78rem}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.b-bl{background:rgba(79,142,247,.1);color:var(--accent)}.b-gn{background:rgba(16,185,129,.1);color:var(--success)}.b-rd{background:rgba(239,68,68,.1);color:var(--danger)}.b-am{background:rgba(245,158,11,.1);color:#b45309}.b-pu{background:rgba(139,92,246,.12);color:#7c3aed}.b-pk{background:rgba(236,72,153,.12);color:#db2777}.b-go{background:var(--gold-light);color:var(--gold-dark)}.b-gy{background:var(--surface2);color:var(--muted)}

/* stat cards */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px}
.sc{background:#fff;border-radius:16px;padding:20px 22px;display:flex;align-items:center;gap:14px;transition:all .25s;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.05);animation:cardPop .35s ease forwards;position:relative;overflow:hidden}
.sc:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.sc::after{content:'';position:absolute;top:0;right:0;bottom:0;width:80px;background:linear-gradient(90deg,transparent,rgba(245,197,24,.04));pointer-events:none}
.si{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.sv{font-size:1.9rem;font-weight:700;color:var(--text);line-height:1.1}
.sl{font-size:.8rem;color:var(--muted);margin-top:1px;font-weight:500}
/* quick links */
.ql-g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.ql{display:flex;flex-direction:column;gap:6px;padding:18px;background:#fff;border:1.5px solid rgba(0,0,0,.05);border-radius:14px;cursor:pointer;transition:all .25s}
.ql:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-3px);box-shadow:0 4px 14px rgba(245,197,24,.1)}
.ql .qi{font-size:1.4rem}.ql .qt{font-weight:600;font-size:.88rem}.ql .qd{color:var(--muted);font-size:.75rem}
/* activity */
.ai{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.85rem}
.ai:last-child{border-bottom:none}
.ad{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:dotPop .4s ease forwards}
.atm{font-size:.72rem;color:var(--muted);margin-left:auto;white-space:nowrap}
/* progress */
.pi{margin-bottom:14px}
.pl{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:5px}
.pl span:first-child{font-weight:600}.pl span:last-child{color:var(--muted)}
.pt{width:100%;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;animation:barGrow 1.2s cubic-bezier(.34,1.56,.64,1) forwards}
/* table */
.tw{overflow-x:auto;border-radius:14px;border:1px solid rgba(0,0,0,.05);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:var(--surface);padding:11px 14px;text-align:left;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid rgba(0,0,0,.06)}
tbody td{padding:12px 14px;border-bottom:1px solid rgba(0,0,0,.03)}
tbody tr{transition:background .15s}tbody tr:hover{background:#fafbff}tbody tr:last-child td{border-bottom:none}
.ac{display:flex;gap:5px}
/* forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid.c3{grid-template-columns:1fr 1fr 1fr}
.form-grid.c1{grid-template-columns:1fr}
.form-row{display:flex;gap:10px;margin-top:16px}
.form-panel{background:var(--surface);border-radius:14px;padding:22px;margin-bottom:20px;border:1px solid rgba(0,0,0,.04)}
/* checkbox grid */
.cg{display:flex;flex-wrap:wrap;gap:6px}
.cg label{display:flex;align-items:center;gap:5px;font-size:.8rem;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:8px;border:1px solid rgba(0,0,0,.06);background:#fff;transition:all .15s}
.cg label:has(input:checked){background:var(--gold-light);border-color:var(--gold);color:var(--navy-deep);font-weight:600}
.cg input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px}
/* avail grid */
.avail-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;font-size:.72rem;margin-top:8px}
.avail-grid .ah{background:var(--surface);padding:6px 4px;text-align:center;font-weight:600;color:var(--muted);border-radius:4px}
.avail-grid .ac2{background:#fff;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:4px;border:1px solid rgba(0,0,0,.04)}
.avail-grid .ac2 input{accent-color:var(--gold);width:14px;height:14px}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeUp .25s}
.modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:1.15rem;font-weight:700;margin-bottom:18px}
/* toast */
.toast-wrap{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{min-width:280px;max-width:400px;padding:12px 18px;border-radius:12px;font-size:.85rem;font-weight:500;background:var(--navy-deep);color:#fff;border-left:4px solid var(--gold);box-shadow:0 6px 24px rgba(0,0,0,.18);animation:toastSlide .4s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px}
.toast.ts{border-left-color:var(--success)}.toast.tw2{border-left-color:var(--warning)}.toast.te{border-left-color:var(--danger)}
/* filter tabs */
.ftabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.ftab{padding:7px 16px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;border:1.5px solid rgba(0,0,0,.08);background:#fff;color:var(--muted);transition:all .2s}
.ftab.active,.ftab:hover{background:var(--gold-light);border-color:var(--gold);color:var(--navy-deep)}
/* course cards */
.cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.cc{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:20px;transition:all .25s;animation:cardPop .3s ease}
.cc:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.07);border-color:var(--gold)}
.cc .cc-code{font-size:.72rem;font-weight:700;color:var(--gold-dark);background:var(--gold-light);padding:2px 10px;border-radius:6px;display:inline-block;margin-bottom:6px}
.cc .cc-name{font-size:.95rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.cc .cc-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:.75rem}
/* responsive */
/* timetable grid */
.tg{display:grid;gap:1px;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06);border-radius:16px;overflow:hidden}
.tg .th2{background:var(--surface);padding:11px 8px;font-weight:700;font-size:.75rem;text-align:center;color:var(--navy);text-transform:uppercase;letter-spacing:.04em}
.tg .ts2{background:var(--surface);padding:10px 6px;font-weight:600;font-size:.73rem;color:var(--muted);display:flex;align-items:center;justify-content:center}
.tg .tc2{background:#fff;padding:6px;min-height:66px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-size:.75rem;transition:background .15s}
.tg .tc2:hover{background:#fafbff}
.tg .tc2 .cn2{font-weight:700;font-size:.78rem;color:var(--text)}.tg .tc2 .fn2{color:var(--muted);font-size:.7rem}.tg .tc2 .rn2{color:#b0b5c0;font-size:.66rem;margin-top:1px}
.tg .tc2.empty{background:var(--surface);color:var(--muted)}.tg .tc2.lunch{background:var(--gold-light);color:var(--gold-dark);font-weight:600}
.tg .tc2.d0{background:#ddeeff;border-left:3px solid #4a9eff}.tg .tc2.d1{background:#e5fbe5;border-left:3px solid #34c759}.tg .tc2.d2{background:#fff3e0;border-left:3px solid #ff9f0a}.tg .tc2.d3{background:#fce4ec;border-left:3px solid #ff3b30}.tg .tc2.d4{background:#e8eaf6;border-left:3px solid #5856d6}.tg .tc2.d5{background:#f3e5f5;border-left:3px solid #af52de}.tg .tc2.d6{background:#e0f2f1;border-left:3px solid #00bcd4}
.tg .tc2.cancelled{background:#fff5f5;border-left:3px solid var(--danger)}
/* algo cards */
.algo-g{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.algo-c{background:#fff;border:1.5px solid rgba(0,0,0,.08);border-radius:14px;padding:18px;cursor:pointer;transition:all .25s}
.algo-c:hover{border-color:var(--gold);box-shadow:0 4px 14px rgba(245,197,24,.08)}.algo-c.sel{border-color:var(--gold);background:rgba(245,197,24,.04)}
.ar{width:16px;height:16px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.algo-c.sel .ar{border-color:var(--gold)}.algo-c.sel .ar::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--gold)}
.spinner2{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
.btn-gen{width:100%;background:linear-gradient(135deg,var(--navy),var(--navy-deep));color:#fff;padding:13px;font-size:.92rem;font-weight:600;border-radius:12px;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-gen:hover{box-shadow:0 6px 20px rgba(20,29,66,.4);transform:translateY(-1px)}.btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-gen.ok{background:linear-gradient(135deg,var(--success),#059669)!important}
/* attendance */
.att-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.04);transition:background .15s}
.att-row:hover{background:#fafbff}.att-row:last-child{border-bottom:none}
.att-btns{display:flex;gap:5px}
.att-b{padding:5px 12px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;font-family:inherit;background:var(--surface)}
.att-b.sel-p{background:rgba(16,185,129,.15);color:var(--success);border-color:var(--success)}
.att-b.sel-a{background:rgba(239,68,68,.1);color:var(--danger);border-color:var(--danger)}
.att-b.sel-od{background:rgba(79,142,247,.1);color:var(--accent);border-color:var(--accent)}
/* student views */
.hero{background:var(--navy-deep);border-radius:16px;padding:28px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;color:#fff;animation:fadeUp .5s}
.hero-l{display:flex;align-items:center;gap:18px}
.hero-av{width:72px;height:72px;border-radius:50%;border:3px solid var(--gold);background:linear-gradient(135deg,var(--navy),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:#fff}
.hero-name{font-size:1.4rem;font-weight:700}.hero-id{display:inline-block;background:var(--gold);color:var(--navy-deep);padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;margin-top:4px}
.hero-meta{color:rgba(255,255,255,.55);font-size:.82rem;margin-top:3px}
.hero-r{display:flex;gap:14px}
.hstat{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 18px;text-align:center;min-width:90px}
.hstat .hv{font-size:1.4rem;font-weight:700;color:#fff}.hstat .hl{font-size:.7rem;color:rgba(255,255,255,.45);margin-top:1px}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.det-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.04)}.det-row:last-child{border-bottom:none}
.det-l{font-size:.73rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}.det-v{font-size:.86rem;font-weight:500}
.cp-wrap{display:flex;flex-wrap:wrap;gap:12px}
.cp-card{flex:1;min-width:120px;max-width:160px;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:14px;text-align:center;transition:all .2s;animation:cardPop .3s}
.cp-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.cp-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;position:relative}
.cp-ring .cp-val{font-size:.78rem;font-weight:700;position:absolute}
.cp-card .cp-code{font-size:.7rem;font-weight:700;color:var(--gold-dark)}.cp-card .cp-name{font-size:.66rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.today-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:10px;padding:8px 14px;margin:3px;font-size:.8rem;transition:all .2s;animation:cardPop .3s}
.today-chip:hover{transform:translateY(-2px);box-shadow:0 2px 6px rgba(0,0,0,.05)}
.today-chip .tc-dot{width:7px;height:7px;border-radius:50%}
.lunch-chip{background:var(--gold-light);border-color:var(--gold);font-weight:600;color:var(--gold-dark)}
.tt-slot{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:18px;margin-bottom:10px;transition:all .25s;animation:cardPop .3s}
.tt-slot:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.06)}
@keyframes absentPulse{0%,100%{background:#fff5f5}50%{background:#fff}}
.tt-slot.absent-slot{background:#fff5f5;border-left:4px solid var(--danger);animation:absentPulse 2s infinite}
.status-pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:600}
.sp-on{background:rgba(16,185,129,.12);color:var(--success)}.sp-done{background:var(--surface2);color:var(--muted)}.sp-up{background:rgba(79,142,247,.1);color:var(--accent)}.sp-cancel{background:rgba(239,68,68,.1);color:var(--danger)}
.att-banner{background:var(--navy-deep);color:#fff;border-radius:14px;padding:16px 22px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.sum-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.sum-c{background:#fff;border-radius:14px;padding:18px;text-align:center;border:1px solid rgba(0,0,0,.06)}
.sum-c .sc-v{font-size:1.7rem;font-weight:700}.sum-c .sc-l{font-size:.8rem;color:var(--muted);margin-top:1px}
.att-pct{font-weight:700}.att-pct.good{color:var(--success)}.att-pct.mid{color:var(--warning)}.att-pct.bad{color:var(--danger)}
.mini-bar{width:100%;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:3px}
.mini-bar-fill{height:100%;border-radius:3px;animation:barGrow 1.2s cubic-bezier(.34,1.56,.64,1) forwards}
@media(max-width:900px){.sb{transform:translateX(-100%);transition:transform .3s}.sb.open{transform:translateX(0)}.main{margin-left:0}.sg{grid-template-columns:repeat(2,1fr)}.ql-g{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.form-grid.c3{grid-template-columns:1fr}.algo-g{grid-template-columns:1fr}.det-grid{grid-template-columns:1fr}.sum-cards{grid-template-columns:1fr}.hero{flex-direction:column;text-align:center;gap:16px}.hero-r{justify-content:center}}
@media(max-width:600px){.sg{grid-template-columns:1fr}.ql-g{grid-template-columns:1fr}.main{padding:16px}.lcard{margin:16px;padding:28px 22px}}
</style>

/* Seed attendance — all students, all sections */
(function seedAtt(){
function gen(sid,courses,vary){
DATA.attendance[sid]={};
const base={c:40,p:32,a:6,od:2};
courses.forEach((cc,ci)=>{
const v={c:base.c+ci*2+(vary%3)*2, p:0, a:0, od:0};
const pRate=0.7+((vary+ci)%5)*0.05;
v.p=Math.round(v.c*pRate);v.od=Math.round(v.c*0.04+((vary+ci)%3));v.a=v.c-v.p-v.od;
if(v.a<0){v.a=0;v.od=v.c-v.p}
DATA.attendance[sid][cc]={};
let pi=0,ai=0,oi=0;const s=new Date(2026,0,5);
for(let d=0;pi+ai+oi<v.c;d++){const dt=new Date(s);dt.setDate(dt.getDate()+d);const dw=dt.getDay();if(dw===0||dw===6)continue;const k=dt.toISOString().split("T")[0];
if(pi<v.p){DATA.attendance[sid][cc][k]="P";pi++}else if(oi<v.od){DATA.attendance[sid][cc][k]="OD";oi++}else if(ai<v.a){DATA.attendance[sid][cc][k]="A";ai++}}
})}
DATA.sections.forEach(sec=>{
sec.students.forEach((sid,si)=>gen(sid,sec.courses,si*7+sec.id.charCodeAt(5)))
})})();

function calcAtt(sid,cc){const r=DATA.attendance[sid]?.[cc]||{};let P=0,A=0,OD=0;Object.values(r).forEach(v=>{if(v==='P')P++;else if(v==='A')A++;else if(v==='OD')OD++});const c=P+A+OD;return{conducted:c,present:P,absent:A,odml:OD,pct:c>0?parseFloat(((P+OD)/c*100).toFixed(1)):0}}
function getSlotStatus(s){const h=new Date().getHours();const p=s.split('-');let sh=+p[0],eh=+p[1];if(sh<8)sh+=12;if(eh<8||eh<=sh)eh+=12;if(h>=eh)return'done';if(h>=sh&&h<eh)return'ongoing';return'upcoming'}

/* Seed attendance — all students, all sections */
(function seedAtt(){
function gen(sid,courses,vary){
DATA.attendance[sid]={};
const base={c:40,p:32,a:6,od:2};
courses.forEach((cc,ci)=>{
const v={c:base.c+ci*2+(vary%3)*2, p:0, a:0, od:0};
const pRate=0.7+((vary+ci)%5)*0.05;
v.p=Math.round(v.c*pRate);v.od=Math.round(v.c*0.04+((vary+ci)%3));v.a=v.c-v.p-v.od;
if(v.a<0){v.a=0;v.od=v.c-v.p}
DATA.attendance[sid][cc]={};
let pi=0,ai=0,oi=0;const s=new Date(2026,0,5);
for(let d=0;pi+ai+oi<v.c;d++){const dt=new Date(s);dt.setDate(dt.getDate()+d);const dw=dt.getDay();if(dw===0||dw===6)continue;const k=dt.toISOString().split('T')[0];
if(pi<v.p){DATA.attendance[sid][cc][k]='P';pi++}else if(oi<v.od){DATA.attendance[sid][cc][k]='OD';oi++}else if(ai<v.a){DATA.attendance[sid][cc][k]='A';ai++}}
})}
DATA.sections.forEach(sec=>{
sec.students.forEach((sid,si)=>gen(sid,sec.courses,si*7+sec.id.charCodeAt(5)))
})})();

function calcAtt(sid,cc){const r=DATA.attendance[sid]?.[cc]||{};let P=0,A=0,OD=0;Object.values(r).forEach(v=>{if(v==='P')P++;else if(v==='A')A++;else if(v==='OD')OD++});const c=P+A+OD;return{conducted:c,present:P,absent:A,odml:OD,pct:c>0?parseFloat(((P+OD)/c*100).toFixed(1)):0}}
function getSlotStatus(s){const h=new Date().getHours();const p=s.split('-');let sh=+p[0],eh=+p[1];if(sh<8)sh+=12;if(eh<8||eh<=sh)eh+=12;if(h>=eh)return'done';if(h>=sh&&h<eh)return'ongoing';return'upcoming'}

function buildGrid(entries,days,slots,labelFn){
let h='<div class="th2"></div>';days.forEach(d=>h+=`<div class="th2">${d}</div>`);
slots.forEach(s=>{if(s==='12-1'){h+=`<div class="ts2">12-1</div>`;days.forEach(()=>h+=`<div class="tc2 lunch">🍽️ Lunch</div>`);return}
h+=`<div class="ts2">${s}</div>`;days.forEach(d=>{const e=entries.find(x=>x.day===d&&x.slot===s);
if(e){const ci=DATA.courses.findIndex(c=>c.code===e.course)%7;const fac=DATA.faculty.find(f=>f.id===e.faculty);const abs=fac&&fac.absentDates.includes(getTodayKey())&&d===getTodayDay();
h+=`<div class="tc2 ${abs?'cancelled':'d'+ci}"><div class="cn2">${e.course}</div><div class="fn2">${labelFn(e)}</div><div class="rn2">${e.room}${abs?' 🚫':''}</div></div>`}
else h+=`<div class="tc2 empty">—</div>`})});return h}

<div class="fg"><label>Department Name</label><input id="dN" placeholder="e.g. Computer Science"></div>
<div class="fg"><label>Code</label><input id="dC" placeholder="e.g. CSE"></div></div>
<input type="hidden" id="dE" value=""><div class="form-row"><button class="btn btn-g" onclick="saveDept()">💾 Save</button><button class="btn btn-o" onclick="toggleDeptForm()">Cancel</button></div></div>
<div class="card"><div class="tw"><table><thead><tr><th>#</th><th>Name</th><th>Code</th><th>Students</th><th>Actions</th></tr></thead><tbody id="dTb"></tbody></table></div></div>`;
}
function toggleDeptForm(){const f=$('deptForm');f.style.display=f.style.display==='none'?'block':'none';$('dN').value='';$('dC').value='';$('dE').value=''}
function renderDeptTable(){const tb=$('dTb');if(!tb)return;
tb.innerHTML=DATA.departments.map((d,i)=>{const cnt=DATA.students.filter(s=>s.dept===d.code).length;
return`<tr><td>${i+1}</td><td>${d.name}</td><td><span class="badge ${deptBadge(d.code)}">${d.code}</span></td><td>${cnt}</td><td class="ac"><button class="btn btn-o btn-sm" onclick="editDept(${d.id})">✏️</button><button class="btn btn-d btn-sm" onclick="delDept(${d.id})">🗑️</button></td></tr>`}).join('')}
function saveDept(){
const n=$('dN').value.trim(),c=$('dC').value.trim().toUpperCase(),eid=$('dE').value;
if(!n||!c){showToast('⚠️ Fill both fields','warning');return}
if(eid){const d=DATA.departments.find(x=>x.id==eid);if(d){d.name=n;d.code=c}showToast('✅ Department updated','success')}
else{DATA.departments.push({id:Date.now(),name:n,code:c});showToast('✅ Department added','success')}
toggleDeptForm();renderDeptTable()}
function editDept(id){const d=DATA.departments.find(x=>x.id===id);if(!d)return;$('deptForm').style.display='block';$('dN').value=d.name;$('dC').value=d.code;$('dE').value=d.id}
function delDept(id){if(!confirm('Delete?'))return;DATA.departments=DATA.departments.filter(x=>x.id!==id);showToast('🗑️ Department deleted','error');renderDeptTable()}

/* ═══ COURSES ═══ */
let courseFilter='All';
function pgCourses(){
return`<div class="hdr"><div><h2>📚 Courses</h2><p>Manage course catalog</p></div><button class="btn btn-g" onclick="openCourseModal()">+ Add Course</button></div>
<div class="ftabs" id="cTabs"></div><div class="cc-grid" id="cGrid"></div>`;
}
function renderCourseCards(){
const tabs=$('cTabs'),grid=$('cGrid');if(!tabs||!grid)return;
tabs.innerHTML=['All',...DATA.departments.map(d=>d.code)].map(c=>`<span class="ftab ${courseFilter===c?'active':''}" onclick="courseFilter='${c}';renderCourseCards()">${c}</span>`).join('');
const filtered=courseFilter==='All'?DATA.courses:DATA.courses.filter(c=>c.dept===courseFilter);
grid.innerHTML=filtered.length?filtered.map(c=>`<div class="cc"><span class="cc-code">${c.code}</span><div class="cc-name">${c.name}</div><div class="cc-meta"><span class="badge ${deptBadge(c.dept)}">${c.dept}</span><span class="badge ${diffBadge(c.difficulty)}">${c.difficulty}</span><span class="badge b-bl">${c.credits} cr</span><span class="badge b-gy">${c.type}</span><span class="badge b-go">${c.classesPerWeek}/wk</span></div><div class="ac" style="margin-top:12px"><button class="btn btn-o btn-sm" onclick="editCourse('${c.code}')">✏️ Edit</button><button class="btn btn-d btn-sm" onclick="delCourse('${c.code}')">🗑️</button></div></div>`).join(''):'<p style="color:var(--muted);padding:20px">No courses in this department.</p>'}
function openCourseModal(editCode){
const c=editCode?DATA.courses.find(x=>x.code===editCode):null;
const m=document.createElement('div');m.className='modal-bg';m.id='cModal';
m.innerHTML=`<div class="modal"><h3>${c?'Edit':'Add'} Course</h3>
<div class="form-grid"><div class="fg"><label>Code</label><input id="cmCode" value="${c?c.code:''}" ${c?'readonly':''}></div>
<div class="fg"><label>Name</label><input id="cmName" value="${c?c.name:''}"></div>
<div class="fg"><label>Department</label><select id="cmDept">${DATA.departments.map(d=>`<option value="${d.code}" ${c&&c.dept===d.code?'selected':''}>${d.code} — ${d.name}</option>`).join('')}</select></div>
<div class="fg"><label>Credits</label><input id="cmCr" type="number" value="${c?c.credits:3}" min="1" max="6"></div>
<div class="fg"><label>Difficulty</label><select id="cmDf"><option ${c&&c.difficulty==='Easy'?'selected':''}>Easy</option><option ${(!c||c.difficulty==='Medium')?'selected':''}>Medium</option><option ${c&&c.difficulty==='Hard'?'selected':''}>Hard</option></select></div>
<div class="fg"><label>Classes/Week</label><input id="cmCpw" type="number" value="${c?c.classesPerWeek:3}" min="1" max="6"></div>
<div class="fg"><label>Type</label><select id="cmTy"><option ${(!c||c.type==='Theory')?'selected':''}>Theory</option><option ${c&&c.type==='Lab'?'selected':''}>Lab</option></select></div></div>
<div class="form-row"><button class="btn btn-g" onclick="saveCourse(${c?"true":"false"})">💾 Save</button><button class="btn btn-o" onclick="$('cModal').remove()">Cancel</button></div></div>`;
document.body.appendChild(m);m.addEventListener('click',e=>{if(e.target===m)m.remove()});}
function editCourse(code){openCourseModal(code)}
function saveCourse(isEdit){
const code=$('cmCode').value.trim(),name=$('cmName').value.trim();
if(!code||!name){showToast('⚠️ Fill code & name','warning');return}
const obj={code,name,dept:$('cmDept').value,credits:+$('cmCr').value,difficulty:$('cmDf').value,classesPerWeek:+$('cmCpw').value,type:$('cmTy').value};
if(isEdit){const i=DATA.courses.findIndex(c=>c.code===code);if(i>-1)DATA.courses[i]=obj;showToast('✅ Course updated','success')}
else{if(DATA.courses.find(c=>c.code===code)){showToast('⚠️ Code already exists','warning');return}DATA.courses.push(obj);showToast('✅ Course added','success')}
$('cModal').remove();renderCourseCards()}
function delCourse(code){if(!confirm('Delete?'))return;DATA.courses=DATA.courses.filter(c=>c.code!==code);showToast('🗑️ Course deleted','error');renderCourseCards()}

/* ═══ FACULTY ═══ */
function pgFaculty(){
return`<div class="hdr"><div><h2>👨‍🏫 Faculty</h2><p>Manage faculty members</p></div><button class="btn btn-g" onclick="openFacModal()">+ Add Faculty</button></div>
<div class="card"><div class="tw"><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Dept</th><th>Sections</th><th>Courses</th><th>Today</th><th>Actions</th></tr></thead><tbody id="fTb"></tbody></table></div></div>`;
}
function renderFacTable(){const tb=$('fTb');if(!tb)return;const today=getTodayKey();
tb.innerHTML=DATA.faculty.map(f=>{const abs=f.absentDates.includes(today);
return`<tr><td>${f.id}</td><td>${f.name}</td><td style="font-size:.8rem;color:var(--muted)">${f.email}</td><td><span class="badge ${deptBadge(f.dept)}">${f.dept}</span></td><td>${f.assignedSections.join(', ')||'—'}</td><td style="font-size:.78rem">${f.canTeach.join(', ')}</td><td>${abs?'<span class="badge b-rd">Absent</span>':'<span class="badge b-gn">Present</span>'}</td><td class="ac"><button class="btn ${abs?'btn-o':'btn-d'} btn-sm" onclick="toggleAbs('${f.id}')">${abs?'✅':'🚫'}</button><button class="btn btn-o btn-sm" onclick="openFacModal('${f.id}')">✏️</button><button class="btn btn-d btn-sm" onclick="delFac('${f.id}')">🗑️</button></td></tr>`}).join('')}
function toggleAbs(fid){const f=DATA.faculty.find(x=>x.id===fid);if(!f)return;const today=getTodayKey();
if(f.absentDates.includes(today)){f.absentDates=f.absentDates.filter(d=>d!==today);showToast(`✅ ${f.name} marked present`,'success')}
else{f.absentDates.push(today);showToast(`⚠️ ${f.name} marked absent today`,'warning')}renderFacTable()}
function openFacModal(editId){
const f=editId?DATA.faculty.find(x=>x.id===editId):null;
const days=DATA.university.days,slots=DATA.university.slots.filter(s=>s!=='12-1');
const m=document.createElement('div');m.className='modal-bg';m.id='fModal';
m.innerHTML=`<div class="modal" style="max-width:720px"><h3>${f?'Edit':'Add'} Faculty</h3>
<div class="form-grid c3"><div class="fg"><label>Faculty ID</label><input id="fmId" value="${f?f.id:''}" ${f?'readonly':''}></div>
<div class="fg"><label>Name</label><input id="fmNm" value="${f?f.name:''}" oninput="autoFacEmail()"></div>
<div class="fg"><label>Department</label><select id="fmDp">${DATA.departments.map(d=>`<option value="${d.code}" ${f&&f.dept===d.code?'selected':''}>${d.code}</option>`).join('')}</select></div>
<div class="fg"><label>Email</label><input id="fmEm" value="${f?f.email:''}"></div>
<div class="fg"><label>Password</label><input id="fmPw" value="${f?f.password:''}"></div></div>
<div class="fg" style="margin-top:14px"><label>Can Teach (Courses)</label>
<div class="cg">${DATA.courses.map(c=>`<label><input type="checkbox" class="fmCrs" value="${c.code}" ${f&&f.canTeach.includes(c.code)?'checked':''}>${c.code}</label>`).join('')}</div></div>
<div class="fg" style="margin-top:10px"><label>Assigned Sections</label>
<div class="cg">${DATA.sections.map(s=>`<label><input type="checkbox" class="fmSec" value="${s.id}" ${f&&f.assignedSections.includes(s.id)?'checked':''}>${s.name}</label>`).join('')}</div></div>
<div class="fg" style="margin-top:10px"><label>Availability</label>
<div class="avail-grid" style="grid-template-columns:60px repeat(${slots.length},1fr)">
<div class="ah"></div>${slots.map(s=>`<div class="ah">${s}</div>`).join('')}
${days.map(d=>`<div class="ah">${d}</div>${slots.map(s=>`<div class="ac2"><input type="checkbox" class="favl" data-d="${d}" data-s="${s}" ${f&&f.available[d]&&f.available[d].includes(s)?'checked':''}></div>`).join('')}`).join('')}
</div></div>
<div class="form-row"><button class="btn btn-g" onclick="saveFac(${f?'true':'false'})">💾 Save</button><button class="btn btn-o" onclick="$('fModal').remove()">Cancel</button></div></div>`;
document.body.appendChild(m);m.addEventListener('click',e=>{if(e.target===m)m.remove()});}
function autoFacEmail(){const nm=$('fmNm').value.trim().toLowerCase().replace(/^dr\.\s*/,'').split(' ');if(nm.length>=2){$('fmEm').value=nm[0]+'.'+nm[nm.length-1]+'@srmap.edu.in';$('fmPw').value=nm[0]+'.'+nm[nm.length-1]+'@123'}}
function saveFac(isEdit){
const id=$('fmId').value.trim(),nm=$('fmNm').value.trim(),em=$('fmEm').value.trim(),pw=$('fmPw').value.trim(),dp=$('fmDp').value;
if(!id||!nm||!em){showToast('⚠️ Fill required fields','warning');return}
const canTeach=[...document.querySelectorAll('.fmCrs:checked')].map(c=>c.value);
const assignedSections=[...document.querySelectorAll('.fmSec:checked')].map(c=>c.value);
const available={};DATA.university.days.forEach(d=>{const s=[...document.querySelectorAll(`.favl[data-d="${d}"]:checked`)].map(c=>c.dataset.s);if(s.length)available[d]=s});
if(isEdit){const f=DATA.faculty.find(x=>x.id===id);if(f){Object.assign(f,{name:nm,email:em,password:pw,dept:dp,canTeach,assignedSections,available})}showToast('✅ Faculty updated','success')}
else{if(DATA.faculty.find(f=>f.id===id)){showToast('⚠️ ID exists','warning');return}DATA.faculty.push({id,name:nm,email:em,password:pw,dept:dp,canTeach,assignedSections,available,absentDates:[]});showToast('✅ Faculty added','success')}
$('fModal').remove();renderFacTable()}
function delFac(id){if(!confirm('Delete?'))return;DATA.faculty=DATA.faculty.filter(f=>f.id!==id);showToast('🗑️ Faculty deleted','error');renderFacTable()}

/* ═══ STUDENTS ═══ */
function pgStudents(){
return`<div class="hdr"><div><h2>🎓 Students</h2><p>Manage enrolled students</p></div><button class="btn btn-g" onclick="toggleStuForm()">+ Add Student</button></div>
<div class="form-panel" id="stuForm" style="display:none">
<div class="form-grid c3"><div class="fg"><label>Student ID</label><input id="sId" placeholder="STU2024CS050"></div>
<div class="fg"><label>Name</label><input id="sNm" placeholder="Full name"></div>
<div class="fg"><label>Email</label><input id="sEm" placeholder="name@srmap.edu.in"></div>
<div class="fg"><label>Password</label><input id="sPw" value="student123"></div>
<div class="fg"><label>Department</label><select id="sDp" onchange="filterStuSec()">${DATA.departments.map(d=>`<option value="${d.code}">${d.code}</option>`).join('')}</select></div>
<div class="fg"><label>Section</label><select id="sSc"></select></div>
<div class="fg"><label>DOB</label><input id="sDob" placeholder="e.g. 15 March 2005"></div>
<div class="fg"><label>Blood Group</label><input id="sBl" placeholder="e.g. B+"></div>
<div class="fg"><label>Phone</label><input id="sPh" placeholder="+91 98765 43210"></div>
<div class="fg"><label>Hostel</label><input id="sHo" placeholder="Block-C, Room 214"></div>
<div class="fg"><label>Advisor</label><input id="sAd" placeholder="Dr. Arun Kumar"></div>
<div class="fg"><label>CGPA</label><input id="sCg" type="number" step="0.01" value="0"></div></div>
<input type="hidden" id="sEdit" value=""><div class="form-row"><button class="btn btn-g" onclick="saveStu()">💾 Save</button><button class="btn btn-o" onclick="toggleStuForm()">Cancel</button></div></div>
<div class="card"><div class="tw"><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Section</th><th>CGPA</th><th>Actions</th></tr></thead><tbody id="sTb"></tbody></table></div></div>`;
}
function toggleStuForm(){const f=$('stuForm');f.style.display=f.style.display==='none'?'block':'none';['sId','sNm','sEm','sDob','sBl','sPh','sHo','sAd'].forEach(i=>$(i).value='');$('sPw').value='student123';$('sCg').value='0';$('sEdit').value='';filterStuSec()}
function filterStuSec(){const dp=$('sDp').value;$('sSc').innerHTML=DATA.sections.filter(s=>s.dept===dp).map(s=>`<option value="${s.id}">${s.name}</option>`).join('')||'<option value="">No sections</option>'}
function renderStuTable(){const tb=$('sTb');if(!tb)return;
tb.innerHTML=DATA.students.map(s=>{const sec=DATA.sections.find(x=>x.id===s.section);
return`<tr><td>${s.id}</td><td>${s.name}</td><td style="font-size:.8rem;color:var(--muted)">${s.email}</td><td><span class="badge b-go">${sec?sec.name:'—'}</span></td><td>${s.cgpa}</td><td class="ac"><button class="btn btn-o btn-sm" onclick="editStu('${s.id}')">✏️</button><button class="btn btn-d btn-sm" onclick="delStu('${s.id}')">🗑️</button></td></tr>`}).join('')}
function saveStu(){
const id=$('sId').value.trim(),nm=$('sNm').value.trim(),em=$('sEm').value.trim(),pw=$('sPw').value,dp=$('sDp').value,sc=$('sSc').value,eid=$('sEdit').value;
if(!id||!nm){showToast('⚠️ Fill ID & name','warning');return}
const obj={id,name:nm,email:em,password:pw,dept:dp,section:sc,semester:4,year:2,dob:$('sDob').value,blood:$('sBl').value,phone:$('sPh').value,hostel:$('sHo').value,advisor:$('sAd').value,cgpa:+$('sCg').value};
if(eid){const i=DATA.students.findIndex(s=>s.id===eid);if(i>-1)DATA.students[i]=obj;showToast('✅ Student updated','success')}
else{if(DATA.students.find(s=>s.id===id)){showToast('⚠️ ID exists','warning');return}DATA.students.push(obj);
const sec=DATA.sections.find(s=>s.id===sc);if(sec&&!sec.students.includes(id))sec.students.push(id);
DATA.attendance[id]={};showToast('✅ Student added','success')}
toggleStuForm();renderStuTable()}
function editStu(id){const s=DATA.students.find(x=>x.id===id);if(!s)return;$('stuForm').style.display='block';$('sId').value=s.id;$('sNm').value=s.name;$('sEm').value=s.email;$('sPw').value=s.password;$('sDp').value=s.dept;filterStuSec();$('sSc').value=s.section;$('sDob').value=s.dob;$('sBl').value=s.blood;$('sPh').value=s.phone;$('sHo').value=s.hostel;$('sAd').value=s.advisor;$('sCg').value=s.cgpa;$('sEdit').value=s.id}
function delStu(id){if(!confirm('Delete?'))return;DATA.students=DATA.students.filter(s=>s.id!==id);DATA.sections.forEach(s=>s.students=s.students.filter(x=>x!==id));showToast('🗑️ Student deleted','error');renderStuTable()}

/* ═══ SECTIONS ═══ */
function pgSections(){
return`<div class="hdr"><div><h2>👥 Sections</h2><p>Manage class sections</p></div><button class="btn btn-g" onclick="toggleSecForm()">+ Add Section</button></div>
<div class="form-panel" id="secForm" style="display:none">
<div class="form-grid c3"><div class="fg"><label>Section ID</label><input id="xId" placeholder="SEC002"></div>
<div class="fg"><label>Section Name</label><input id="xNm" placeholder="CSE-B"></div>
<div class="fg"><label>Department</label><select id="xDp" onchange="filterSecCrs()">${DATA.departments.map(d=>`<option value="${d.code}">${d.code}</option>`).join('')}</select></div>
<div class="fg"><label>Semester</label><input id="xSm" type="number" value="4" min="1" max="8"></div>
<div class="fg"><label>Year</label><input id="xYr" type="number" value="2" min="1" max="4"></div></div>
<div class="fg" style="margin-top:10px"><label>Courses</label><div class="cg" id="xCrs"></div></div>
<div class="form-row"><button class="btn btn-g" onclick="saveSec()">💾 Save</button><button class="btn btn-o" onclick="toggleSecForm()">Cancel</button></div></div>
<div class="card"><div class="tw"><table><thead><tr><th>ID</th><th>Name</th><th>Dept</th><th>Semester</th><th>Courses</th><th>Students</th><th>Actions</th></tr></thead><tbody id="xTb"></tbody></table></div></div>`;
}
function toggleSecForm(){const f=$('secForm');f.style.display=f.style.display==='none'?'block':'none';['xId','xNm'].forEach(i=>$(i).value='');$('xSm').value='4';$('xYr').value='2';filterSecCrs()}
function filterSecCrs(){const dp=$('xDp').value;$('xCrs').innerHTML=DATA.courses.filter(c=>c.dept===dp).map(c=>`<label><input type="checkbox" class="xCrsCb" value="${c.code}">${c.code} — ${c.name}</label>`).join('')||'<span style="color:var(--muted);font-size:.82rem">No courses for this department</span>'}
function renderSecTable(){const tb=$('xTb');if(!tb)return;
tb.innerHTML=DATA.sections.map(s=>`<tr><td>${s.id}</td><td><span class="badge b-go">${s.name}</span></td><td><span class="badge ${deptBadge(s.dept)}">${s.dept}</span></td><td>Sem ${s.semester}, Yr ${s.year}</td><td>${s.courses.length}</td><td>${s.students.length}</td><td class="ac"><button class="btn btn-d btn-sm" onclick="delSec('${s.id}')">🗑️</button></td></tr>`).join('')}
function saveSec(){
const id=$('xId').value.trim(),nm=$('xNm').value.trim(),dp=$('xDp').value;
if(!id||!nm){showToast('⚠️ Fill ID & name','warning');return}
if(DATA.sections.find(s=>s.id===id)){showToast('⚠️ ID exists','warning');return}
const courses=[...document.querySelectorAll('.xCrsCb:checked')].map(c=>c.value);
DATA.sections.push({id,name:nm,dept:dp,semester:+$('xSm').value,year:+$('xYr').value,courses,students:[]});
showToast('✅ Section added','success');toggleSecForm();renderSecTable()}
function delSec(id){if(!confirm('Delete?'))return;DATA.sections=DATA.sections.filter(s=>s.id!==id);showToast('🗑️ Section deleted','error');renderSecTable()}

/* ═══ INIT ═══ */
$('loginView').style.display='flex';$('appView').style.display='none';
</script>
</body>
</html>
