    function attUpdateSlots() {
      const secId = $('attSecSel').value, dateStr = $('attDate').value;
      const slotSel = $('attSlotSel'), loadBtn = $('loadRollBtn');
      slotSel.innerHTML = '<option value="">— no slots —</option>';
      loadBtn.disabled = true;
      if (!secId || !dateStr) return;
      const day = getDayFromDate(dateStr);
      if (day === 'Sun' || day === 'Sat') { slotSel.innerHTML = '<option value="">No classes on weekends</option>'; return }
      // Use == for comparison to handle string/number IDs
      const slots = DATA.timetable.filter(t => t.section == secId && t.faculty === currentFaculty.id && t.day === day).sort((a, b) => getSlotOrder(a.slot) - getSlotOrder(b.slot));
      if (slots.length === 0) { slotSel.innerHTML = '<option value="">No classes for this section on ' + day + '</option>'; return }
      slotSel.innerHTML = '<option value="">— Select Slot —</option>' + slots.map(s => `<option value="${s.slot}" data-course="${s.course}">${s.slot.replace('-', ' – ')} — ${courseName(s.course)}</option>`).join('');
      slotSel.onchange = () => { loadBtn.disabled = !slotSel.value };
    }
    async function loadAttendanceRollCall() {
      const secId = $('attSecSel').value, dateStr = $('attDate').value, slot = $('attSlotSel').value;
      if (!secId || !dateStr || !slot) return;
      const courseOpt = $('attSlotSel').selectedOptions[0];
      const courseCode = courseOpt.dataset.course;
      const sec = DATA.sections.find(s => s.id == secId);
      if (!sec) return;
      const entry = DATA.timetable.find(t => t.section == secId && t.faculty === currentFaculty.id && t.day === getDayFromDate(dateStr) && t.slot === slot);
      if (!entry) return;
      const stuList = sec.students.map(sid => DATA.students.find(s => s.id == sid || s.regNo == sid)).filter(Boolean).sort((a, b) => a.name.localeCompare(b.name));
      
      // Fetch fresh attendance from server (Sync with Smart Attendance)
      let serverMarks = {};
      try {
        const res = await fetch(`/api/attendance/get-roll?section_id=${secId}&course_id=${DATA.courses.find(c=>c.code===courseCode).id}&date=${dateStr}`);
        if (res.ok) {
          const d = await res.json();
          serverMarks = d.marks || {};
        }
      } catch(e) { console.warn("Failed to fetch server attendance", e); }

      attMarks = serverMarks;
      const hasExisting = Object.keys(attMarks).length > 0;

      const banner = $('attBanner');
      banner.innerHTML = `<div class="att-header">
    <div class="att-icon">📝</div>
    <div class="att-header-info"><h3>${courseName(courseCode)} (${courseCode})</h3><p>${sec.name} · ${formatDate(dateStr)} · ${slot.replace('-', ' – ')} · 📍 ${entry.room}</p></div>
    <span class="att-badge ${hasExisting ? 'existing' : 'new'}">${hasExisting ? '🔄 Syncing with Database' : '✨ New Session'}</span>
  </div>
  ${hasExisting ? '<div style="background:#f0f9ff;border:1px solid rgba(59,130,246,.3);border-radius:12px;padding:10px 16px;margin-bottom:12px;font-size:.78rem;color:#1e40af">🔄 Found existing records (from Smart QR or previous manual save). You can edit them below.</div>' : ''}
  <div class="progress-label" id="progLabel">0 of ${stuList.length} students marked</div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>`;
      const area = $('attRollArea');
      area.innerHTML = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-green" onclick="markAll('P')">✅ Mark All Present</button>
    <button class="btn btn-red-o" onclick="markAll('A')">❌ Mark All Absent</button>
  </div>
  <input class="search-input" id="rollSearch" placeholder="🔍 Search student..." oninput="filterRoll()">
  <div id="rollList">${stuList.map((s, i) => {
        const m = attMarks[s.id] || attMarks[s.regNo] || '';
        return `<div class="roll-row" id="roll-${s.id}" data-name="${s.name.toLowerCase()}" data-reg="${s.regNo.toLowerCase()}">
      <div class="roll-num">${i + 1}</div>
      <div class="stu-av">${avatarHtml(s.photo, s.name, 44)}</div>
      <div class="roll-info"><div class="rn">${s.name}</div><div class="rr">${s.regNo}</div></div>
      <div class="roll-btns">
        <button class="att-btn ${m === 'P' ? 'sel-p' : ''}" onclick="setMark('${s.id}','P',this)">✅ Present</button>
        <button class="att-btn ${m === 'A' ? 'sel-a' : ''}" onclick="setMark('${s.id}','A',this)">❌ Absent</button>
        <button class="att-btn ${m === 'OD' ? 'sel-od' : ''}" onclick="setMark('${s.id}','OD',this)">📋 OD/ML</button>
      </div>
    </div>`;
      }).join('')}</div>
  <div class="sticky-save" id="stickyBar">
    <div class="save-summary" id="saveSummary"></div>
    <button class="btn btn-save" id="saveBtn" onclick="saveAttendance()">💾 Save Attendance</button>
  </div>`;
      area.dataset.secId = secId; area.dataset.date = dateStr; area.dataset.course = courseCode; area.dataset.count = stuList.length;
      updateProgressBar();
    }
    function setMark(stuId, mark, btn) {
      if (attMarks[stuId] === mark) { delete attMarks[stuId] } else { attMarks[stuId] = mark }
      const row = document.getElementById('roll-' + stuId);
      if (row) {
        row.querySelectorAll('.att-btn').forEach(b => { b.className = 'att-btn' });
        if (attMarks[stuId]) {
          btn.className = 'att-btn sel-' + (mark === 'P' ? 'p' : mark === 'A' ? 'a' : 'od');
        }
        row.classList.remove('unmarked-highlight');
      }
      updateProgressBar();
    }
    function markAll(mark) {
      const area = $('attRollArea');
      const sec = DATA.sections.find(s => s.id === area.dataset.secId);
      if (!sec) return;
      sec.students.forEach(sid => { attMarks[sid] = mark });
      document.querySelectorAll('.roll-row').forEach(row => {
        const sid = row.id.replace('roll-', '');
        row.querySelectorAll('.att-btn').forEach(b => b.className = 'att-btn');
        const sel = mark === 'P' ? 0 : mark === 'A' ? 1 : 2;
        row.querySelectorAll('.att-btn')[sel].className = 'att-btn sel-' + (mark === 'P' ? 'p' : mark === 'A' ? 'a' : 'od');
        row.classList.remove('unmarked-highlight');
      });
      updateProgressBar();
    }
    function updateProgressBar() {
      const area = $('attRollArea'); if (!area.dataset.count) return;
      const total = +area.dataset.count;
      let p = 0, a = 0, od = 0;
      Object.values(attMarks).forEach(v => { if (v === 'P') p++; else if (v === 'A') a++; else if (v === 'OD') od++ });
      const marked = p + a + od, unmarked = total - marked;
      const pct = total > 0 ? Math.round(marked / total * 100) : 0;
      const fill = $('progFill'); if (fill) fill.style.width = pct + '%';
      const label = $('progLabel'); if (label) label.textContent = `${marked} of ${total} students marked`;
      const summary = $('saveSummary');
      if (summary) summary.innerHTML = `<span>✅ <span class="sc sc-p">${p}</span> Present</span>
    <span>❌ <span class="sc sc-a">${a}</span> Absent</span>
    <span>📋 <span class="sc sc-od">${od}</span> OD/ML</span>
    <span>⬜ <span class="sc sc-u">${unmarked}</span> Unmarked</span>`;
    }
    async function saveAttendance() {
      const area = $('attRollArea'), secId = area.dataset.secId, dateStr = area.dataset.date, courseCode = area.dataset.course;
      const sec = DATA.sections.find(s => s.id == secId); if (!sec) return;
      
      const unmarkedCount = sec.students.length - Object.keys(attMarks).length;
      if (unmarkedCount > 0) {
        showToast(`⚠️ Please mark all ${sec.students.length} students!`, 'warning'); return;
      }

      const btn = $('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="display:inline-block"></div> Saving…';

      try {
        const courseId = DATA.courses.find(c => c.code === courseCode).id;
        const res = await fetch('/api/attendance/manual-save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': $('csrf-token')?.content || '' },
          body: JSON.stringify({ section_id: secId, course_id: courseCode, date: dateStr, marks: attMarks })
        });
        
        if (res.ok) {
          btn.className = 'btn btn-save saved'; btn.innerHTML = '✅ Saved Successfully!';
          setTimeout(() => { btn.className = 'btn btn-save'; btn.innerHTML = '💾 Save Attendance'; btn.disabled = false; }, 2500);
          showToast(`✅ Attendance saved to database!`, 'success');
        } else {
          throw new Error('Server error');
        }
      } catch(e) {
        showToast('❌ Failed to save to database', 'error');
        btn.disabled = false; btn.innerHTML = '💾 Save Attendance';
      }
    }
    function filterRoll() {
      const q = $('rollSearch').value.toLowerCase();
      document.querySelectorAll('.roll-row').forEach(r => {
        r.style.display = (r.dataset.name.includes(q) || r.dataset.reg.includes(q)) ? 'flex' : 'none';
      });
    }

    /* ═══════════════════════════════════════
       PAGE 6 — REPORT ABSENCE
       ═══════════════════════════════════════ */
    function pgAbsence() {
      const f = currentFaculty;
      const tKey = getTodayKey();
      const tomKey = getTomKey();
      
      const selKey = currentPageArgs.date || tKey;
      const isTom = selKey === tomKey;
      
      const todayClasses = myClassesForDate(selKey);
      const currentlyAbsent = DATA.facultyAbsence[f.id]?.[selKey] || [];
      
      let html = `<div class="section-title">🚫 Report My Absence</div>
      <div style="display:flex;gap:10px;margin-bottom:20px">
        <button class="btn ${!isTom ? 'btn-navy' : 'btn-navy-o'}" onclick="showPage('absence',{date:'${tKey}'})">📅 Today</button>
        <button class="btn ${isTom ? 'btn-navy' : 'btn-navy-o'}" onclick="showPage('absence',{date:'${tomKey}'})">📆 Tomorrow</button>
      </div>
      <div style="font-size:.82rem;color:var(--muted);margin-bottom:18px">Reporting absence for <strong>${formatDate(selKey)}</strong></div>`;

      if (todayClasses.length === 0 || getDayFromDate(selKey) === 'Sun' || getDayFromDate(selKey) === 'Sat') {
        html += `<div class="card"><div class="empty-state"><span class="es-icon">🎉</span>No classes scheduled for this day.</div></div>`;
      } else {
        html += `<div class="card" style="padding:0;overflow:hidden">
          <div style="padding:15px 20px;background:#f9fafb;border-bottom:1px solid #eee;font-weight:600;font-size:.85rem">📅 Classes on ${getDayFromDate(selKey)}</div>
          <div style="padding:10px">`;
        
        todayClasses.forEach(t => {
          const st = isTom ? 'upcoming' : getSlotStatus(t.slot);
          const sec = DATA.sections.find(s => s.id === t.section);
          const isMarked = currentlyAbsent.includes(t.slot);
          const isDone = st === 'done';
          
          html += `
          <label class="absence-row ${isDone ? 'abs-done' : ''} ${isMarked ? 'abs-marked' : ''}" style="display:flex;align-items:center;padding:12px;border-radius:10px;margin-bottom:8px;border:1px solid #eee;cursor:${isDone ? 'default' : 'pointer'};transition:all .2s">
            <input type="checkbox" class="abs-chk-v2" value="${t.slot}" ${isMarked ? 'checked' : ''} ${isDone ? 'disabled' : ''} style="width:18px;height:18px;accent-color:var(--danger);margin-right:15px">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
                <span class="pill pill-amber">${t.slot}</span>
                <strong style="font-size:.9rem">${courseName(t.course)}</strong>
                <span class="pill pill-gold">${sec?.name || t.section}</span>
              </div>
              <div style="font-size:.76rem;color:var(--muted)">📍 ${t.room} · ${st === 'done' ? '✅ Already completed' : st === 'ongoing' ? '🟢 Class in progress' : '🔵 Upcoming'}</div>
            </div>
            ${isDone ? '<span style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase">Done</span>' : ''}
            ${isMarked && !isDone ? '<span style="font-size:.7rem;font-weight:700;color:var(--danger);text-transform:uppercase">Marked Absent</span>' : ''}
          </label>`;
        });
        
        html += `</div>
          <div style="padding:15px 20px;background:#fff5f5;border-top:1px solid #fee2e2;display:flex;justify-content:space-between;align-items:center;gap:15px">
            <div style="font-size:.78rem;color:#991b1b;flex:1">Confirming will notify students and update their timetable for <strong>${isTom ? 'Tomorrow' : 'Today'}</strong>.</div>
            <div style="display:flex;gap:10px">
              ${currentlyAbsent.length > 0 ? `<button class="btn btn-navy-o" onclick="undoDateAbsence('${selKey}')">🔄 Undo All</button>` : ''}
              <button class="btn btn-red btn-lg" onclick="confirmAbsenceV2('${selKey}')" style="padding:12px 24px">🚫 Report My Absent</button>
            </div>
          </div>
        </div>`;
      }
      return html;
    }

    async function undoDateAbsence(dateKey) {
      const f = currentFaculty;
      try {
        const res = await fetch('/api/faculty/report-absence', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content },
          body: JSON.stringify({ faculty_id: f.id, date: dateKey, slots: [] })
        });
        if (!res.ok) throw new Error('Undo failed');

        if (!DATA.facultyAbsence[f.id]) DATA.facultyAbsence[f.id] = {};
        DATA.facultyAbsence[f.id][dateKey] = [];
        
        const existing = JSON.parse(localStorage.getItem(`absence_notif_${dateKey}`) || '[]');
        localStorage.setItem(`absence_notif_${dateKey}`, JSON.stringify(existing.filter(n => n.facultyId !== f.id)));
        
        showToast(`✅ Absences cleared persistently.`, 'success');
        showPage('absence', { date: dateKey });
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function confirmAbsenceV2(dateKey) {
      const f = currentFaculty;
      const selKey = dateKey || getTodayKey();
      const checked = [...document.querySelectorAll('.abs-chk-v2:checked')].map(c => c.value);
      const disabled = [...document.querySelectorAll('.abs-chk-v2:disabled')].map(c => c.value);
      
      const currentlyAbsent = DATA.facultyAbsence[f.id]?.[selKey] || [];
      const pastAbsent = currentlyAbsent.filter(s => disabled.includes(s));
      const finalSelection = [...new Set([...pastAbsent, ...checked])];
      
      try {
          const res = await fetch('/api/faculty/report-absence', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content },
              body: JSON.stringify({ faculty_id: f.id, date: selKey, slots: finalSelection })
          });
          if (!res.ok) throw new Error('Database update failed');

          if (!DATA.facultyAbsence[f.id]) DATA.facultyAbsence[f.id] = {};
          DATA.facultyAbsence[f.id][selKey] = finalSelection;
          
          if (checked.length > 0) {
              const notifiedSections = [];
              myClassesForDate(selKey).forEach(t => {
                  if (checked.includes(t.slot)) {
                      if (!notifiedSections.includes(t.section)) notifiedSections.push(t.section);
                  }
              });
              
              const notif = {
                  facultyId: f.id,
                  facultyName: f.name,
                  dateKey: selKey,
                  slots: checked,
                  sections: notifiedSections,
                  message: `⚠️ Absence Report: ${f.name} will be absent for [${checked.join(', ')}] on ${formatDate(selKey)}.`,
                  timestamp: new Date().getTime()
              };
              
              const existing = JSON.parse(localStorage.getItem(`absence_notif_${selKey}`) || '[]');
              localStorage.setItem(`absence_notif_${selKey}`, JSON.stringify([...existing.filter(n => n.facultyId !== f.id), notif]));
              showToast(`✅ Absence record saved to database!`, 'success');
          } else {
              showToast(`✅ Schedule updated (all cleared).`, 'success');
          }
          showPage('absence', { date: selKey });
      } catch (e) { showToast(e.message, 'error'); }
    }
    function undoFacultyAbsence() {
      DATA.facultyAbsence[currentFaculty.id][getTodayKey()] = [];
      showToast('✅ Absence undone! You are back on duty.', 'success');
      showPage('absence');
    }

    /* ═══ AUTO INIT ═══ */
    // If page args need auto-load after render
    const origShowPage = showPage;
    showPage = function (page, args) {
      origShowPage(page, args);
      if (page === 'stutt') setTimeout(stvLoadStudents, 100);
      if (page === 'markatt') setTimeout(() => { if ($('attSecSel') && $('attSecSel').value) attUpdateSlots() }, 100);
    };

    /* ═══ AUTO-LOGIN FROM FLASK ═══ */
    (function () {
      const autoEmail = "{{ current_email }}";
      if (autoEmail) {
        const fac = DATA.faculty.find(f => f.email === autoEmail.toLowerCase());
        if (fac) {
          currentFaculty = fac;
          currentRole = 'faculty';
          initApp();
          return;
        }
      }
    })();
  </script>
  <!-- Faculty AI Chatbot Widget -->
  <button class="chat-fab" id="facChatFab" onclick="toggleFacChat()" title="Ask Faculty AI">
    <span>🤖</span>
  </button>

  <div class="chat-panel" id="facChatPanel">
    <div class="chat-header">
      <h3><span class="icon">🤖</span> Faculty Assistant</h3>
      <button class="chat-close" onclick="toggleFacChat()">✕</button>
    </div>
    <div class="chat-messages" id="facChatMessages">
      <div class="chat-msg bot">
        <div class="chat-bubble">
          👋 Hi! I'm your Faculty Assistant. I can help you with your schedule, student lists, and attendance.
        </div>
      </div>
    </div>
    <div class="chat-suggestions" id="facChatSuggestions">
      <div class="suggestion-chip" onclick="sendFacChat('What are my classes today?')">Today's Classes</div>
      <div class="suggestion-chip" onclick="sendFacChat('Show attendance for my courses')">Attendance Summary</div>
      <div class="suggestion-chip" onclick="sendFacChat('Which students are below 75%?')">At-risk Students</div>
      <div class="suggestion-chip" onclick="sendFacChat('Show my full week schedule')">Full Week</div>
    </div>
    <form class="chat-input-area" onsubmit="handleFacChat(event)">
      <input type="text" id="facChatInput" class="chat-input" placeholder="Ask about schedule..." autocomplete="off">
      <button type="submit" class="chat-send-btn" id="facChatSend">➤</button>
    </form>
  </div>

  <script>
    let facChatHistory = [];
    let facChatOpen = false;

    function toggleFacChat() {
      facChatOpen = !facChatOpen;
      document.getElementById('facChatPanel').classList.toggle('open', facChatOpen);
      if (facChatOpen) document.getElementById('facChatInput').focus();
    }

    async function handleFacChat(e) {
      e.preventDefault();
      const input = document.getElementById('facChatInput');
      const msg = input.value.trim();
      if (!msg) return;

      sendFacChat(msg);
      input.value = '';
    }

    async function sendFacChat(msg) {
      appendFacMsg('user', msg);
      facChatHistory.push({ role: 'user', content: msg });

      const typing = document.createElement('div');
      typing.className = 'chat-msg bot';
      typing.id = 'facTyping';
      typing.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      document.getElementById('facChatMessages').appendChild(typing);
      scrollFacChat();

      try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
        const res = await fetch('/api/chatbot/faculty', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({ messages: facChatHistory.slice(-10) })
        });
        const data = await res.json();
        const typingEl = document.getElementById('facTyping');
        if (typingEl) typingEl.remove();

        if (data.reply) {
          const actionMatch = data.reply.match(/```action\s*\n([\s\S]*?)```/);
          let displayText = data.reply;
          let actionHtml = '';

          if (actionMatch) {
            try {
              const actionJson = JSON.parse(actionMatch[1]);
              displayText = data.reply.replace(actionMatch[0], '');
              actionHtml = `<div class="action-overlay" style="background:rgba(124,58,237,0.1);border:1px solid var(--faculty-purple);padding:12px;border-radius:8px;margin-top:8px;">
                        <strong style="color:var(--faculty-purple)">⚡ AI Suggestion:</strong> ${actionJson.action}
                        <button class="lbtn" style="padding:8px;margin-top:8px;font-size:0.8rem;background:var(--faculty-purple);color:#fff" onclick="executeFacAction('${encodeURIComponent(JSON.stringify(actionJson))}')">Execute Action</button>
                    </div>`;
            } catch (e) { console.error(e); }
          }

          appendFacMsg('bot', displayText, actionHtml);
          facChatHistory.push({ role: 'assistant', content: data.reply });
        } else {
          appendFacMsg('bot', 'Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        const typingEl = document.getElementById('facTyping');
        if (typingEl) typingEl.remove();
        appendFacMsg('bot', '❌ Connection error.');
      }
    }

    async function executeFacAction(encoded) {
      const action = JSON.parse(decodeURIComponent(encoded));
      if (!confirm(`Do you want to execute ${action.action}?`)) return;

      showToast(`AI is executing ${action.action}...`, 'info');

      try {
        if (action.action === 'get_my_schedule') {
          showPage('timetable');
        } else if (action.action === 'mark_attendance') {
          const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
          const res = await fetch('/api/attendance/mark', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
            body: JSON.stringify(action)
          });
          const data = await res.json();
          showToast(data.message || 'Attendance marked!', 'success');
          sendFacChat(`Result of marking attendance: ${data.message || 'Success'}`);
        } else if (action.action === 'get_section_students') {
          showPage('stutt', { section_id: action.section_id });
        } else if (action.action === 'get_attendance_summary' || action.action === 'get_students_below_threshold') {
          showPage('dashboard');
        } else {
          showToast(`Action ${action.action} handled.`, 'success');
        }
      } catch (e) {
        showToast('Action execution failed', 'error');
      }
    }

    function appendFacMsg(role, text, extraHtml = '') {
      const container = document.getElementById('facChatMessages');
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;

      let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/### (.*?)<br>/g, '<h4>$1</h4>')
        .replace(/## (.*?)<br>/g, '<h3>$1</h3>');

      if (text.includes('|')) {
        const lines = text.split('\n');
        let inTable = false;
        let tableHtml = '<table>';
        let newHtml = '';

        lines.forEach(line => {
          if (line.trim().startsWith('|')) {
            if (!inTable) { inTable = true; tableHtml = '<table>'; }
            const cells = line.split('|').filter(c => c.trim() !== '' || line.indexOf(c) > 0 && line.indexOf(c) < line.length - 1);
            if (line.includes('---')) return;
            tableHtml += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
          } else {
            if (inTable) { inTable = false; tableHtml += '</table>'; newHtml += tableHtml; }
            newHtml += line + '<br>';
          }
        });
        if (inTable) { tableHtml += '</table>'; newHtml += tableHtml; }
        html = newHtml;
      }

      div.innerHTML = `<div class="chat-bubble">${html}${extraHtml}</div>`;
      container.appendChild(div);
      scrollFacChat();
    }

    function scrollFacChat() {
      const el = document.getElementById('facChatMessages');
      el.scrollTop = el.scrollHeight;
    }
  </script>
</body>
